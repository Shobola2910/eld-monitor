services:
  - type: web
    name: eld-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: ASANA_TOKEN
        sync: false
      - key: ASANA_PROJECT_ID
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_PHONE
        sync: false
      - key: TELEGRAM_SESSION
        sync: false
      - key: FACTOR_API_TOKEN
        sync: false
      - key: LEADER_API_TOKEN
        sync: false
      - key: LEADER_COMPANY_ID
        sync: false
      - key: CHECK_INTERVAL_MINUTES
        value: "5"
      - key: DRIVE_ALERT_THRESHOLD_MIN
        value: "60"
      - key: SHIFT_ALERT_THRESHOLD_MIN
        value: "60"
      - key: BREAK_ALERT_THRESHOLD_MIN
        value: "30"
      - key: CYCLE_ALERT_THRESHOLD_HOURS
        value: "5"
